<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador</title>
</head>
<body>
   <h1>Simulador Financeiro</h1>

   <h3>Saiba os prejuízos que você terá caso não invista no nosso projeto:</h3>

   Quantos m² de solo fértil possui sua estufa?: <input id="ipt_metros"><br>
   Que tipo de tomate você planta?: <input id="ipt_tipo"><br>
   Produtividade por m² (em kg): <input id="ipt_produtividade"><br>
   Valor de venda (R$ por kg): <input id="ipt_venda"><br>

   <br> <button onclick="tomate()">Calcule seus prejuízos</button><br>
   <br> <div id="div_msg"></div>

<script>
    let mes = 0;
    let acumulado = 0;
    

    function tomate() {
        let venda = Number(ipt_venda.value);
        let metros = Number(ipt_metros.value);
        let tipo = ipt_tipo.value;
        let produtividade = Number(ipt_produtividade.value);

        let plantas = metros * 2 
        let resultado = plantas * produtividade; 
        let total = resultado * 0.125
        mes += 120;
        acumulado += total; 

        div_msg.innerHTML += 
            `A cada ${mes} dias a sua plantação de ${tipo} tem um prejuízo de R$ ${acumulado.toFixed(2)}<br>`;
    }
</script>
</body>
</html>
